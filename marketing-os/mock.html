<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Marketing Operating System — Interactive Mock</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0C0E10;
    --panel: #161A1D;
    --panel-2: #1F2428;
    --panel-3: #262B30;
    --border: #2A2F33;
    --text: #F4F2EE;
    --muted: #8A8880;
    --faint: #4A4845;
    --orange: #E8621A;
    --amber: #F5A623;
    --teal: #3D9BAD;
    --spark: #D93B18;
    --green: #6FB65A;
    --red: #D9534F;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.55;
    font-size: 14px;
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, textarea, select { font-family: inherit; }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .topbar .brand {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 22px;
    text-transform: uppercase;
    letter-spacing: 0.005em;
  }
  .topbar .brand em { font-style: normal; color: var(--orange); }
  .topbar .meta {
    display: flex;
    gap: 18px;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.06em;
  }
  .topbar .meta .pulse {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 0 0 rgba(111,182,90,0.6);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(111,182,90,0.6); }
    70% { box-shadow: 0 0 0 8px rgba(111,182,90,0); }
    100% { box-shadow: 0 0 0 0 rgba(111,182,90,0); }
  }
  .topbar .reset {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    padding: 5px 10px;
    border: 1px solid var(--border);
    border-radius: 3px;
  }
  .topbar .reset:hover { color: var(--red); border-color: var(--red); }

  .layout {
    display: grid;
    grid-template-columns: 220px 1fr 360px;
    min-height: calc(100vh - 53px);
  }
  @media (max-width: 1100px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar, .rightbar { border: none !important; }
  }

  /* ── SIDEBAR ─────────────────────────────────────────── */
  .sidebar {
    background: var(--panel);
    border-right: 1px solid var(--border);
    padding: 24px 0;
  }
  .sidebar .group {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.16em;
    color: var(--muted);
    text-transform: uppercase;
    padding: 14px 24px 8px;
  }
  .sidebar .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 24px;
    font-size: 13px;
    color: var(--text);
    border-left: 2px solid transparent;
    transition: background 0.15s, border-color 0.15s;
    width: 100%;
    text-align: left;
  }
  .sidebar .nav-item:hover { background: var(--panel-2); }
  .sidebar .nav-item.active {
    background: var(--panel-2);
    border-left-color: var(--orange);
  }
  .sidebar .nav-item .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--orange);
  }
  .sidebar .nav-item.teal .dot  { background: var(--teal); }
  .sidebar .nav-item.spark .dot { background: var(--spark); }
  .sidebar .nav-item.amber .dot { background: var(--amber); }
  .sidebar .nav-item .badge {
    margin-left: auto;
    background: var(--panel-3);
    color: var(--muted);
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    padding: 2px 7px;
    border-radius: 10px;
  }
  .sidebar .nav-item.active .badge {
    background: var(--orange);
    color: var(--bg);
  }

  /* ── MAIN ───────────────────────────────────────────── */
  .main { padding: 32px 40px; min-width: 0; }
  .panel-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 36px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .panel-title em { font-style: normal; color: var(--orange); }
  .panel-sub {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 28px;
  }

  .scenario-card {
    background: var(--panel);
    border-left: 3px solid var(--orange);
    padding: 18px 22px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: background 0.15s, transform 0.15s;
  }
  .scenario-card:hover { background: var(--panel-2); transform: translateX(2px); }
  .scenario-card.teal { border-left-color: var(--teal); }
  .scenario-card.spark { border-left-color: var(--spark); }
  .scenario-card.amber { border-left-color: var(--amber); }
  .scenario-card .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.16em;
    color: var(--orange);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .scenario-card.teal .label { color: var(--teal); }
  .scenario-card.spark .label { color: var(--spark); }
  .scenario-card.amber .label { color: var(--amber); }
  .scenario-card .ttl {
    font-weight: 600;
    font-size: 15px;
    margin-bottom: 4px;
  }
  .scenario-card .pre {
    color: var(--muted);
    font-size: 13px;
  }

  .custom-form {
    background: var(--panel);
    padding: 22px;
    margin-top: 18px;
    border-left: 3px solid var(--faint);
  }
  .custom-form label {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .custom-form textarea, .custom-form input, .custom-form select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    font-size: 13.5px;
    border-radius: 3px;
    margin-bottom: 14px;
    font-family: inherit;
    resize: vertical;
  }
  .custom-form textarea:focus, .custom-form input:focus {
    outline: none;
    border-color: var(--orange);
  }
  .btn-primary {
    background: var(--orange);
    color: var(--bg);
    padding: 11px 20px;
    border-radius: 3px;
    font-weight: 600;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn-primary:hover { opacity: 0.92; }
  .btn-primary:active { transform: translateY(1px); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-ghost {
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 16px;
    border-radius: 3px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .btn-ghost:hover { border-color: var(--orange); color: var(--orange); }

  /* ── PROCESSING ─────────────────────────────────────── */
  .processing {
    background: var(--panel);
    border-left: 3px solid var(--amber);
    padding: 22px;
    margin: 18px 0;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .processing .spinner {
    width: 24px; height: 24px;
    border: 2px solid var(--border);
    border-top-color: var(--amber);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .processing .step {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--amber);
    letter-spacing: 0.06em;
  }

  /* ── RIGHTBAR (queue) ───────────────────────────────── */
  .rightbar {
    background: var(--panel);
    border-left: 1px solid var(--border);
    padding: 24px;
    overflow-y: auto;
    max-height: calc(100vh - 53px);
    position: sticky;
    top: 53px;
  }
  .rightbar h3 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 900;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .rightbar .sub {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 18px;
  }
  .queue-item {
    background: var(--panel-2);
    padding: 14px 16px;
    margin-bottom: 10px;
    border-left: 2px solid var(--orange);
    cursor: pointer;
    transition: background 0.15s, transform 0.15s;
  }
  .queue-item:hover { background: var(--panel-3); }
  .queue-item.teal { border-left-color: var(--teal); }
  .queue-item.spark { border-left-color: var(--spark); }
  .queue-item.amber { border-left-color: var(--amber); }
  .queue-item.approved { opacity: 0.55; border-left-color: var(--green); }
  .queue-item .qlabel {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.16em;
    color: var(--orange);
    margin-bottom: 4px;
  }
  .queue-item.teal .qlabel { color: var(--teal); }
  .queue-item.spark .qlabel { color: var(--spark); }
  .queue-item.amber .qlabel { color: var(--amber); }
  .queue-item.approved .qlabel { color: var(--green); }
  .queue-item .qttl { font-weight: 600; font-size: 13px; margin-bottom: 2px; }
  .queue-item .qsub { font-size: 11.5px; color: var(--muted); }
  .empty-queue {
    color: var(--muted);
    font-size: 12.5px;
    padding: 20px;
    text-align: center;
    font-style: italic;
    background: var(--panel-2);
    border: 1px dashed var(--border);
  }

  /* ── DRAFT DETAIL ───────────────────────────────────── */
  .draft-section {
    background: var(--panel);
    margin-bottom: 14px;
    border-left: 3px solid var(--orange);
  }
  .draft-section .ds-head {
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 1px solid var(--border);
  }
  .draft-section .ds-channel {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--orange);
    flex-grow: 1;
  }
  .draft-section.teal { border-left-color: var(--teal); }
  .draft-section.spark { border-left-color: var(--spark); }
  .draft-section.amber { border-left-color: var(--amber); }
  .draft-section.green { border-left-color: var(--green); }
  .draft-section.teal .ds-channel { color: var(--teal); }
  .draft-section.spark .ds-channel { color: var(--spark); }
  .draft-section.amber .ds-channel { color: var(--amber); }
  .draft-section.green .ds-channel { color: var(--green); }

  .ds-body { padding: 18px 20px; }
  .ds-body textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 14px;
    font-size: 13.5px;
    line-height: 1.6;
    border-radius: 3px;
    resize: vertical;
    min-height: 70px;
  }
  .ds-body textarea:focus { outline: none; border-color: var(--orange); }
  .ds-meta {
    display: flex;
    gap: 14px;
    margin-top: 8px;
    font-size: 11.5px;
    color: var(--muted);
  }
  .ds-actions {
    padding: 12px 20px;
    background: var(--panel-2);
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .ds-actions .draft-id {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-right: auto;
  }
  .btn-approve {
    background: var(--green);
    color: var(--bg);
    padding: 7px 16px;
    border-radius: 3px;
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .btn-reject {
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 7px 14px;
    border-radius: 3px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .btn-reject:hover { color: var(--red); border-color: var(--red); }

  .approve-all-bar {
    background: var(--panel);
    border-left: 3px solid var(--green);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 14px;
  }
  .approve-all-bar .lbl {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--green);
    flex-grow: 1;
  }

  /* ── PUBLISHED PREVIEWS ─────────────────────────────── */
  .published-card {
    background: var(--panel);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 14px;
    border: 1px solid var(--border);
  }
  .pc-head {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--panel-2);
  }
  .pc-head .icon {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--orange);
    color: var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-weight: 800;
    font-size: 13px;
    font-family: 'Barlow Condensed', sans-serif;
  }
  .pc-head .who { font-weight: 600; font-size: 13px; }
  .pc-head .when { color: var(--muted); font-size: 11.5px; margin-left: auto; }
  .pc-body { padding: 14px 16px; font-size: 13.5px; line-height: 1.55; }
  .pc-body .hashtags { color: var(--orange); margin-top: 8px; font-size: 12.5px; }
  .pc-meta {
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.06em;
  }

  /* Tabs in main */
  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 18px;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    padding: 10px 18px;
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    border-bottom: 2px solid transparent;
  }
  .tab.active {
    color: var(--text);
    border-bottom-color: var(--orange);
  }

  .empty {
    background: var(--panel);
    border: 1px dashed var(--border);
    padding: 32px;
    color: var(--muted);
    text-align: center;
    font-size: 13px;
  }

  .review-input {
    background: var(--panel-2);
    padding: 14px 18px;
    border-radius: 4px;
    margin-bottom: 14px;
  }
  .review-input .stars { color: var(--amber); font-size: 14px; letter-spacing: 0.1em; }
  .review-input .who { font-size: 11.5px; color: var(--muted); margin: 4px 0 6px; }
  .review-input .text { font-size: 13.5px; color: var(--text); }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--green);
    color: var(--bg);
    padding: 12px 22px;
    border-radius: 3px;
    font-size: 13px;
    font-weight: 600;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-6px); }

  .seo-page-preview {
    background: white;
    color: #1a1a1a;
    padding: 28px 32px;
    border-radius: 4px;
    font-family: 'Inter', sans-serif;
  }
  .seo-page-preview h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px;
    font-weight: 900;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 8px;
  }
  .seo-page-preview .meta-desc {
    font-size: 12px;
    color: #666;
    font-style: italic;
    border-bottom: 1px dashed #ccc;
    padding-bottom: 12px;
    margin-bottom: 14px;
  }
  .seo-page-preview h2 {
    font-size: 16px;
    color: #1a1a1a;
    margin-top: 14px;
    margin-bottom: 6px;
    font-weight: 700;
  }
  .seo-page-preview p { font-size: 13.5px; margin-bottom: 10px; line-height: 1.55; }

  .footer-link {
    display: block;
    text-align: center;
    padding: 18px;
    color: var(--muted);
    font-size: 12px;
    text-decoration: none;
    border-top: 1px solid var(--border);
  }
  .footer-link a { color: var(--orange); }

  /* ── DICTATION ─────────────────────────────────────────── */
  .ds-textarea-wrap { position: relative; }
  .mic-btn {
    position: absolute;
    bottom: 10px;
    right: 10px;
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--panel-3);
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s ease;
    border: 1px solid var(--border);
    z-index: 2;
  }
  .mic-btn:hover {
    color: var(--orange);
    border-color: var(--orange);
    background: var(--panel);
  }
  .mic-btn.recording {
    background: var(--red);
    color: white;
    border-color: var(--red);
    box-shadow: 0 0 0 0 rgba(217,83,79,0.7);
    animation: micPulse 1.4s infinite;
  }
  .mic-btn.recording:hover { background: var(--red); color: white; }
  @keyframes micPulse {
    0%   { box-shadow: 0 0 0 0 rgba(217,83,79,0.6); }
    70%  { box-shadow: 0 0 0 12px rgba(217,83,79,0); }
    100% { box-shadow: 0 0 0 0 rgba(217,83,79,0); }
  }
  .mic-btn svg { width: 16px; height: 16px; }
  .mic-btn[disabled] { opacity: 0.3; cursor: not-allowed; }

  .live-transcript {
    margin-top: 8px;
    padding: 10px 14px;
    background: rgba(217,83,79,0.08);
    border-left: 2px solid var(--red);
    font-size: 12.5px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    line-height: 1.5;
    display: none;
  }
  .live-transcript.active { display: block; }
  .live-transcript .label {
    color: var(--red);
    font-size: 10px;
    letter-spacing: 0.16em;
    margin-bottom: 4px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .live-transcript .label::before {
    content: '';
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--red);
    animation: micPulse 1.4s infinite;
  }
  .live-transcript .interim { opacity: 0.55; font-style: italic; }

  .polishing {
    margin-top: 8px;
    padding: 10px 14px;
    background: rgba(245,166,35,0.08);
    border-left: 2px solid var(--amber);
    font-size: 12.5px;
    color: var(--amber);
    font-family: 'JetBrains Mono', monospace;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .polishing .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(245,166,35,0.25);
    border-top-color: var(--amber);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  .dictation-toggle {
    margin-top: 8px;
    display: flex;
    gap: 0;
    align-items: center;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
  }
  .dictation-toggle .dt-label {
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-right: 10px;
    text-transform: uppercase;
  }
  .dictation-toggle .dt-btn {
    background: var(--panel-2);
    color: var(--muted);
    padding: 4px 12px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    border: 1px solid var(--border);
  }
  .dictation-toggle .dt-btn:first-of-type { border-radius: 3px 0 0 3px; }
  .dictation-toggle .dt-btn:last-of-type  { border-radius: 0 3px 3px 0; border-left: none; }
  .dictation-toggle .dt-btn.active {
    background: var(--orange);
    color: var(--bg);
    border-color: var(--orange);
  }
  .dictation-toggle .dt-meta {
    margin-left: auto;
    color: var(--muted);
    font-size: 10px;
    letter-spacing: 0.06em;
  }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--panel-3); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--faint); }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">Marketing <em>OS</em> · Demo</div>
  <div class="meta">
    <span><span class="pulse"></span> &nbsp;tenant:&nbsp;jones</span>
    <span>·</span>
    <span id="stat-pending">0 pending</span>
    <span>·</span>
    <span id="stat-published">0 published</span>
    <button class="reset" onclick="resetDemo()">Reset demo</button>
  </div>

// ════════════════════════════════════════════════════════════════════════
//  STATE — localStorage-backed
// ════════════════════════════════════════════════════════════════════════
const STORAGE_KEY = 'mos_demo_state_v1';
const DEFAULT_STATE = { drafts: [], view: 'field' };
let state = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return structuredClone(DEFAULT_STATE);
    return JSON.parse(raw);
  } catch (e) { return structuredClone(DEFAULT_STATE); }
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function resetDemo() {
  if (!confirm('Reset the demo? All drafts will be cleared.')) return;
  state = structuredClone(DEFAULT_STATE);
  saveState();
  render();
}
function uid() { return Math.random().toString(36).slice(2, 10); }
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

function render() {
  const main = document.getElementById('main');

  // Sidebar active
  document.querySelectorAll('.nav-item').forEach(b => {
    b.classList.toggle('active', b.dataset.view === state.view);
  });

  // Counts
  const pending = state.drafts.filter(d => d.status === 'pending').length;
  const published = state.drafts.filter(d => d.status === 'approved').length;
  document.getElementById('stat-pending').textContent = `${pending} pending`;
  document.getElementById('stat-published').textContent = `${published} published`;
  document.getElementById('badge-field').textContent = state.drafts.filter(d => d.kind==='field' && d.status==='pending').length;
  document.getElementById('badge-reviews').textContent = state.drafts.filter(d => d.kind==='review' && d.status==='pending').length;
  document.getElementById('badge-leads').textContent = state.drafts.filter(d => d.kind==='lead' && d.status==='pending').length;
  document.getElementById('badge-seo').textContent = state.drafts.filter(d => d.kind==='seo' && d.status==='pending').length;
  document.getElementById('badge-published').textContent = published;

  // View
  if (state.view === 'field') main.innerHTML = renderField();
  else if (state.view === 'reviews') main.innerHTML = renderReviews();
  else if (state.view === 'leads') main.innerHTML = renderLeads();
  else if (state.view === 'seo') main.innerHTML = renderSeo();
  else if (state.view === 'published') main.innerHTML = renderPublished();
  else if (state.view === 'about') main.innerHTML = renderAbout();
  else if (state.view === 'draft') main.innerHTML = renderDraft();

  renderQueue();
}

  return `
    <div class="draft-section ${color}">
      <div class="ds-head">
        <span class="ds-channel">${channel}</span>
        ${subtitle ? `<span style="font-size:11px;color:var(--muted)">${escapeHtml(subtitle)}</span>` : ''}
      </div>
      <div class="ds-body">
        <div class="ds-textarea-wrap">
          <textarea id="${fid}" oninput="updateDraft('${draftId}','${fieldKey}',this.value)">${escapeHtml(content)}</textarea>
          <button class="mic-btn" id="${fid}_mic" title="Dictate" onclick="micToggle('${draftId}','${fieldKey}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>

        </div>
        <div class="live-transcript" id="${fid}_lt">
          <div class="label">Listening</div>
          <div class="text"><span class="final"></span><span class="interim"></span></div>
        </div>
        <div class="polishing" id="${fid}_polish" style="display:none">
          <div class="spinner"></div>
          <div>Polishing voice into Jones brand voice…</div>

        <div class="dictation-toggle" id="${fid}_toggle">

          <button class="dt-btn ${dict.view==='raw'?'active':''}" onclick="dictView('${draftId}','${fieldKey}','raw')">Raw</button>

          <button class="dt-btn" style="margin-left:10px;border-radius:3px" onclick="micToggle('${draftId}','${fieldKey}')" title="Record again — replaces current">↺ Re-record</button>

function renderQueue() {
  const q = document.getElementById('queue');
  const items = state.drafts.slice().reverse();
  if (items.length === 0) {
    q.innerHTML = `<div class="empty-queue">No drafts yet. Start by clicking a scenario in the main panel.</div>`;
    return;
  }
  q.innerHTML = items.map(d => {
    const cls = d.kind === 'review' ? 'teal' : d.kind === 'lead' ? 'amber' : d.kind === 'seo' ? 'spark' : '';
    const stamp = d.status === 'approved' ? 'approved' : '';
    let label = '', sub = '';
    if (d.kind === 'field') {
      const sc = FIELD_SCENARIOS.find(s => s.id === d.scenario);
      label = 'FIELD INTAKE'; sub = sc.title;
    } else if (d.kind === 'review') {
      const rv = REVIEW_SCENARIOS.find(r => r.id === d.scenario);
      label = 'REVIEW REPLY'; sub = `${rv.rating}★ from ${rv.name}`;
    } else if (d.kind === 'lead') {
      const ld = LEAD_SCENARIOS.find(l => l.id === d.scenario);
      label = 'LEAD TRIAGE'; sub = ld.name;
    } else if (d.kind === 'seo') {
      const t = SEO_TARGETS.find(x => x.id === d.scenario);
      label = 'SEO PAGE'; sub = t.keyword;
    }
    return `
      <div class="queue-item ${cls} ${stamp}" onclick="openDraft('${d.id}')">
        <div class="qlabel">${label} ${d.status==='approved'?'· APPROVED':''}</div>
        <div class="qttl">${escapeHtml(sub)}</div>
        <div class="qsub">draft_${d.id}</div>
      </div>
    `;
  }).join('');
}

//  HANDLERS

function setView(v) { state.view = v; saveState(); render(); }

function processSimulation(label, then) {
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="panel-title">Agent <em>·</em> running</div>
    <div class="processing"><div class="spinner"></div><div class="step" id="proc-step">${label}</div></div>
  `;
  const steps = [label, '> Loading tenant config (jones)', '> Rendering brand-voice prompt', '> Calling Claude API', '> Parsing JSON output', '> Landing in approval queue'];
  let i = 0;
  const interval = setInterval(() => {
    i++;
    if (i >= steps.length) {
      clearInterval(interval);
      then();
      return;
    }
    document.getElementById('proc-step').textContent = steps[i];
  }, 380);
}

function runField(scenarioId) {
  const sc = FIELD_SCENARIOS.find(s => s.id === scenarioId);
  processSimulation('> Receiving foreman text-in via Twilio webhook', () => {
    const id = uid();
    state.drafts.push({
      id,
      kind: 'field',
      scenario: scenarioId,
      brand: sc.division === 'fab' ? 'callus' : 'jones',
      status: 'pending',
      outputs: {
        linkedin: sc.drafts.linkedin,
        linkedin_tags: sc.drafts.linkedin_tags,
        gmb: sc.drafts.gmb,
        gmb_cta: sc.drafts.gmb_cta,
        instagram: sc.drafts.instagram,
        instagram_tags: sc.drafts.instagram_tags,
        blog: sc.drafts.blog,
        blog_title: sc.drafts.blog_title,
        newsletter: sc.drafts.newsletter
      }
    });
    state.view = 'draft';
    state.activeDraft = id;
    saveState();
    render();
    toast('Field-to-Content drafted 5 outputs');
  });
}

function runFieldCustom() {
  const txt = document.getElementById('custom-field').value.trim();
  if (!txt) { toast('Type something first'); return; }
  // Find best-match scenario by simple keyword
  const lower = txt.toLowerCase();
  let pick = FIELD_SCENARIOS[0];
  if (lower.includes('weld') || lower.includes('shop') || lower.includes('mig') || lower.includes('fab')) pick = FIELD_SCENARIOS[2];
  else if (lower.includes('handrail') || lower.includes('stainless')) pick = FIELD_SCENARIOS[3];
  else if (lower.includes('utilit') || lower.includes('sewer') || lower.includes('water') || lower.includes('storm')) pick = FIELD_SCENARIOS[1];
  else pick = FIELD_SCENARIOS[0];
  toast('Matched closest scenario: ' + pick.title);

// ════════════════════════════════════════════════════════════════════════
//  DICTATION — Web Speech API + brand-voice polish
// ════════════════════════════════════════════════════════════════════════
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let activeRecognizer = null; // only one mic at a time
let activeFieldKey = null;
let activeDraftId = null;
let recordStartedAt = 0;

function micToggle(draftId, fieldKey) {
  // Stop existing
  if (activeRecognizer) {
    try { activeRecognizer.stop(); } catch(e) {}
    return;
  }
  if (!SpeechRecognition) {
    toast('Voice capture not supported — try Chrome or Safari');
    return;
  }
  const fid = `f_${draftId}_${fieldKey}`;
  const micBtn = document.getElementById(`${fid}_mic`);
  const lt = document.getElementById(`${fid}_lt`);
  const ltFinal = lt.querySelector('.final');
  const ltInterim = lt.querySelector('.interim');
  ltFinal.textContent = '';
  ltInterim.textContent = '';
  lt.classList.add('active');
  micBtn.classList.add('recording');
  micBtn.title = 'Stop dictation';

  const rec = new SpeechRecognition();
  rec.continuous = true;
  rec.interimResults = true;
  rec.maxAlternatives = 3;
  rec.lang = 'en-US';
  let finalTranscript = '';
  recordStartedAt = Date.now();

  rec.onresult = (event) => {
    let interim = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const result = event.results[i];
      // Pick the alternative with the most recognized domain terms
      const piece = pickBestAlternative(result);
      if (result.isFinal) {
        finalTranscript += piece + ' ';
      } else {
        interim += piece;
      }
    }
    ltFinal.textContent = finalTranscript;
    ltInterim.textContent = interim ? ' ' + interim : '';
  };

  rec.onerror = (event) => {
    if (event.error === 'no-speech') return; // benign
    toast('Mic error: ' + event.error);
  };

  rec.onend = () => {
    micBtn.classList.remove('recording');
    micBtn.title = 'Dictate';
    lt.classList.remove('active');
    activeRecognizer = null;
    activeFieldKey = null;
    activeDraftId = null;
    const raw = (finalTranscript + ' ' + (ltInterim.textContent || '')).trim();
    if (!raw) {
      toast('Nothing captured');
      return;
    }
    runPolish(draftId, fieldKey, raw, Math.round((Date.now() - recordStartedAt) / 1000));
  };

  try { rec.start(); }
  catch (e) { toast('Could not start mic — check permissions'); micBtn.classList.remove('recording'); lt.classList.remove('active'); return; }
  activeRecognizer = rec;
  activeFieldKey = fieldKey;
  activeDraftId = draftId;
}

function runPolish(draftId, fieldKey, raw, durationSec) {
  const fid = `f_${draftId}_${fieldKey}`;
  const polishEl = document.getElementById(`${fid}_polish`);
  if (polishEl) polishEl.style.display = 'flex';

  // Simulate Claude API call latency
  setTimeout(() => {
    const d = state.drafts.find(x => x.id === draftId);
    if (!d) return;
    const polished = polishTranscript(raw, fieldKey, d);
    if (!d.dictation) d.dictation = {};
    d.dictation[fieldKey] = {
      raw: raw,
      polished: polished,
      view: 'polished',
      duration: durationSec,
      word_count: raw.split(/\s+/).filter(Boolean).length,
      timestamp: new Date().toISOString()
    };
    d.outputs[fieldKey] = polished;
    saveState();
    if (polishEl) polishEl.style.display = 'none';
    render();
    const modeLabel = polishModeLabel(fieldKey, d);
    toast('Polished · ' + modeLabel);
  }, 1100);
}

// ─── Best-alternative picker ──────────────────────────────────────
// Web Speech API can return multiple candidates per chunk. Pick the
// one with the highest count of recognized domain terms — Spanish Fork
// almost always beats "Spanish work" by this metric.
const DOMAIN_VOCAB = [
  'jones','callus','holladay','spanish fork','utah','salt lake','mapleton',
  'wasatch','lehi','sandy','west jordan','kaysville','tooele','provo','orem',
  'ogden','draper','american fork','heber','bountiful','layton','park city',
  'udot','swppp','gbp','mig','tig','aws','aisc','osha','linkedin','google',
  'mass-ex','cut-fill','subgrade','subbase','backfill','topsoil','grade',
  'pad','foundation','utilities','sewer','storm','water main','rebar',
  'concrete','asphalt','excavation','foreman','crew','operator','superintendent',
  'aaron','steve','rico','marco','tony','manny','linda','brent','cassidy',
  'rocky mountain','dominion','geneva rock','staker parson','sunroc','clyde',
  'mobile welding','fabrication','handrail','conveyor','line bore','shop',
  'truck','dozer','excavator','loader','grader','trackhoe','cat','komatsu',
  'gc','pm','rfp','rfi','schedule','punch list','bid','estimate','quote'
];
function domainScore(text) {
  const lower = text.toLowerCase();
  let score = 0;
  DOMAIN_VOCAB.forEach(term => { if (lower.includes(term)) score += 2 + term.length / 8; });
  return score;
}
function pickBestAlternative(result) {
  const alts = [];
  for (let i = 0; i < result.length; i++) alts.push(result[i].transcript);
  if (alts.length === 1) return alts[0];
  // Score each — prefer domain match first, fall back to confidence
  let best = alts[0];
  let bestScore = domainScore(alts[0]);
  for (let i = 1; i < alts.length; i++) {
    const s = domainScore(alts[i]);
    if (s > bestScore + 0.5) { best = alts[i]; bestScore = s; }
  }
  return best;
}

function applyDomainFixes(text) {
  for (const [pat, rep] of DOMAIN_FIXES) {
    text = text.replace(pat, rep);
  }
  return text;
}

// ─── Spoken number → digits ───────────────────────────────────────
const NUM_WORDS = {
  zero:0, one:1, two:2, three:3, four:4, five:5, six:6, seven:7, eight:8, nine:9,
  ten:10, eleven:11, twelve:12, thirteen:13, fourteen:14, fifteen:15,
  sixteen:16, seventeen:17, eighteen:18, nineteen:19,
  twenty:20, thirty:30, forty:40, fifty:50, sixty:60, seventy:70, eighty:80, ninety:90
};
function wordsToNum(seq) {
  // seq: array of lowercase words. Returns integer or null.
  if (seq.length === 0) return null;
  let total = 0, current = 0;
  for (const w of seq) {
    if (w === 'and') continue;
    if (w === 'hundred') {
      current = (current || 1) * 100;
    } else if (w === 'thousand') {
      total += (current || 1) * 1000;
      current = 0;
    } else if (w === 'million') {
      total += (current || 1) * 1000000;
      current = 0;
    } else if (NUM_WORDS[w] != null) {
      current += NUM_WORDS[w];
    } else {
      return null;
    }
  }
  total += current;
  return total > 0 ? total : null;
}
function normalizeNumbers(text) {
  // Find sequences of number words and replace with digits.
  const numWordSet = new Set(Object.keys(NUM_WORDS).concat(['hundred','thousand','million','and']));
  return text.replace(/\b(?:[a-z]+(?:\s+[a-z]+)*)\b/gi, (match) => {
    const words = match.toLowerCase().split(/\s+/);
    // Only attempt if all words are number words AND length > 1 (single "two" stays as "two")
    if (words.every(w => numWordSet.has(w)) && words.length > 1) {
      const n = wordsToNum(words);
      if (n != null) {
        // Format with commas if >= 1000
        return n >= 1000 ? n.toLocaleString('en-US') : String(n);
      }
    }
    return match;
  });
}

// ─── Master transcript cleanup pass ───────────────────────────────
function cleanTranscript(raw) {
  let t = raw.trim();
  // Whitespace
  t = t.replace(/\s+/g, ' ').replace(/\s+([,.!?;:])/g, '$1');
  // Numbers first (so "eighteen thousand yards" → "18,000 yards" before
  // domain pass converts "yards" to "CY")
  t = normalizeNumbers(t);
  // Domain dictionary
  t = applyDomainFixes(t);
  return t;
}

/**
 * polishTranscript — multi-mode brand-voice cleanup.
 *
 * Branches on (fieldKey, draft.kind, draft.brand) to apply the right
 * rules per channel. In production this is a single Claude API call
 * with the matching tenant prompt; the rule-based version below mimics
 * what Claude would do per channel for the demo.
 */
function polishTranscript(raw, fieldKey, draft) {
  raw = cleanTranscript(raw);
  let mode = 'general';
  let brand = (draft && draft.brand) || 'jones';
  if (!draft && fieldKey === '__intake__') mode = 'foreman';
  else if (draft && draft.kind === 'field') {
    mode = ({linkedin:'linkedin', gmb:'gmb', instagram:'instagram',
             blog:'blog', newsletter:'newsletter'})[fieldKey] || 'general';
  }
  else if (draft && draft.kind === 'review') mode = 'review';
  else if (draft && draft.kind === 'lead')   mode = 'autoreply';
  else if (draft && draft.kind === 'seo')    mode = 'seo';

  // ─── Pass 1 — universal cleanup ──────────────────────────────────
  let text = raw.trim();

  const fillers = /\b(uh+|um+|er+|ah+|hmm+|like|you know|i mean|basically|literally|sorta|kinda|sort of|kind of|right\?|y'know|yeah|so so)\b[,]?\s*/gi;
  text = text.replace(fillers, '');
  // collapse repeated words
  text = text.replace(/\b(\w+)(\s+\1\b)+/gi, '$1');
  // normalize whitespace + spacing before punctuation
  text = text.replace(/\s+/g, ' ').trim();
  text = text.replace(/\s+([,.!?;:])/g, '$1');

  // capitalize known nouns (names, places, brands, equipment)
  const PROPER = [
    // people
    'brent','cassidy','aaron','steve','rico','marco','tony','manny','linda','jen',
    // brands
    'jones','callus','holladay builders','wm. clyde','geneva rock','staker parson','sunroc','sunco','suncore',
    // utah places
    'spanish fork','utah county','utah','salt lake','mapleton','wasatch','wasatch front',
    'lehi','sandy','west jordan','kaysville','tooele','provo','orem','ogden','draper',
    'south jordan','american fork','bountiful','layton','heber','park city',
    // utility / regulatory
    'udot','rocky mountain power','dominion energy','aws','aisc','swppp','agc',
    'mig','tig','osha',
    // equipment slang (capitalize where appropriate)
    'cat','komatsu','john deere','kenworth','peterbilt'
  ];
  PROPER.forEach(name => {
    const re = new RegExp('\\b' + name.replace(/ /g, '\\s+') + '\\b', 'gi');
    text = text.replace(re, name.replace(/\b\w/g, c => c.toUpperCase()));
  });
  // pronoun "I" forms
  text = text.replace(/\bi\b/g, 'I');
  text = text.replace(/\bi'(m|ll|ve|d)\b/gi, "I'$1");
  // sentence-case
  text = text.replace(/(^|[.!?]\s+)([a-z])/g, (_, p1, p2) => p1 + p2.toUpperCase());
  if (!/[.!?]$/.test(text)) text += '.';

  // ─── Pass 2 — mode-specific shaping ──────────────────────────────
  const lower = text.toLowerCase();

  if (mode === 'foreman') {
    // Foreman voice: keep punchy. Strip leading "so" / "yeah".
    text = text.replace(/^(So,?\s+|Yeah,?\s+|Okay,?\s+|Alright,?\s+|All right,?\s+)/i, '');
    // Normalize common dictation slang
    text = text.replace(/\bthousand\s+yards?\b/gi, 'k yards');
    text = text.replace(/\bcubic\s+yards?\b/gi, 'CY');
    return text;
  }

  if (mode === 'linkedin') {
    // Ensure full-sentence cadence; allow ~3-4 sentences
    if (text.length < 280) {
      const close = brand === 'callus'
        ? ' Built by hand. Built to last.'
        : ' Since 1990.';
      if (!/since 1990|built by hand/i.test(text)) text = text.replace(/\.$/, close);
    }
    // Ensure hashtag tail if none present
    if (!/#\w/.test(text)) {
      const tags = brand === 'callus'
        ? '\n\n#MobileWelding #CustomFabrication #Wasatch'
        : '\n\n#HeavyCivil #UtahConstruction #SiteWork';
      text += tags;
    }
    return text;
  }

  if (mode === 'gmb') {
    // Friendly close
    if (!/give\s+us\s+a\s+call|reach\s+out|we'?d\s+be\s+glad|drop\s+us\s+a\s+line/i.test(text)) {
      text = text.replace(/\.$/, '. If you\'ve got a project coming up, we\'d be glad to talk.');
    }
    // GMB caps at 1500 chars but typical is short
    if (text.length > 600) text = text.slice(0, 580).replace(/[^.!?]*$/, '') + '…';
    return text;
  }

  if (mode === 'instagram') {
    // Punchy: allow fragments, keep short
    // Sign-off if missing
    const sig = brand === 'callus' ? ' — Callus shop crew' : ' — the Jones crew';
    if (!/—\s*(the\s+)?(Jones|Callus)/i.test(text)) {
      text = text.replace(/\.$/, sig);
    }
    if (!/#\w/.test(text)) {
      const tags = brand === 'callus'
        ? '\n\n#mobilewelder #shoplife #wasatchfront #builttough'
        : '\n\n#yellowiron #dirtwork #utahbuilt #since1990';
      text += tags;
    }
    return text;
  }

  if (mode === 'blog') {
    // Full sentences, insert paragraph break after first ~2-3 sentences
    const sentences = text.split(/(?<=[.!?])\s+/);
    if (sentences.length >= 4) {
      const split = Math.ceil(sentences.length / 2);
      text = sentences.slice(0, split).join(' ') + '\n\n' + sentences.slice(split).join(' ');
    }
    return text;
  }

  if (mode === 'newsletter') {
    // Internal voice — leave loose, but tighten openers
    text = text.replace(/^(Just\s+|Also,?\s+|And\s+)/i, '');
    return text;
  }

  if (mode === 'review') {
    const tier = (draft && draft.outputs && draft.outputs.tier) || '3_4_star';
    if (tier === '1_2_star') {
      // mandatory named-contact close
      if (!/call\s+(steve|the\s+office)|reach\s+out|give\s+(us|steve)\s+a\s+call/i.test(text)) {
        text = text.replace(/\.$/, '. Please give Steve a call at the office so we can look into it directly.');
      }
    } else if (tier === '3_4_star') {
      if (/sorry|apolog|frustrat|disappoint/i.test(lower) && !/call|reach/i.test(lower)) {
        text = text.replace(/\.$/, '. If you want to walk through what could\'ve gone better, give Steve a call.');
      }
    } else if (tier === '5_star') {
      if (text.length < 80) text = text.replace(/\.$/, '. We\'ll pass it along to the crew.');
    }
    return text;
  }

  if (mode === 'autoreply') {
    if (!/—\s*(Jones|Callus)/.test(text)) {
      const sig = brand === 'callus' ? '\n\n— ' : '\n\n— Toone Construction Co.';
      text += sig;
    }
    return text;
  }

  if (mode === 'seo') {
    // Expand contractions + tighten
    text = text.replace(/\bdon't\b/g,'do not').replace(/\bcan't\b/g,'cannot').replace(/\bwon't\b/g,'will not')
               .replace(/\bit's\b/g,'it is').replace(/\bwe're\b/g,'we are').replace(/\bthey're\b/g,'they are');
    return text;
  }

  return text;
}
window.micToggle = micToggle;
window.dictView = dictView;
window.micToggleIntake = micToggleIntake;

// ════════════════════════════════════════════════════════════════════════
//  UTIL
// ════════════════════════════════════════════════════════════════════════
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

});
